version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: maternar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - maternar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: maternar_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - maternar_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./ApiDatasus/flask_api
      dockerfile: Dockerfile
    image: maternar_worker:latest
    container_name: maternar_worker
    restart: unless-stopped
    command: python worker.py
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${DB_NAME}
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBIT_USER}
      RABBITMQ_PASSWORD: ${RABBIT_PASSWORD}
      RABBITMQ_VHOST: /
      QUEUE_CLASSIFY: maternar.classificar
      QUEUE_DLX: maternar.classificar.dlq
      MODEL_DIR: /app/models
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - maternar_net

networks:
  maternar_net:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
